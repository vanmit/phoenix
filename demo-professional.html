<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Engine Demo - 专业版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden}
#canvas{display:block;width:100vw;height:100vh}
#loading{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading h1{color:#58a6ff;margin-bottom:20px;font-size:2em}
#loading p{color:#8b949e;margin-bottom:10px}
#loading .progress{width:300px;height:4px;background:#21262d;border-radius:2px;overflow:hidden}
#loading .bar{height:100%;background:linear-gradient(90deg,#58a6ff,#3fb950);width:0;transition:width 0.3s}
#ui{position:fixed;top:10px;left:10px;background:rgba(13,17,23,0.9);backdrop-filter:blur(10px);padding:15px;border-radius:10px;border:1px solid #30363d;min-width:180px;z-index:100}
#ui h3{color:#58a6ff;margin-bottom:12px;font-size:13px;font-weight:600}
.stat{display:flex;justify-content:space-between;margin:6px 0;font-size:11px}
.stat-label{color:#8b949e}
.stat-value{color:#3fb950;font-weight:700}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:rgba(13,17,23,0.9);backdrop-filter:blur(10px);padding:12px;border-radius:10px;border:1px solid #30363d;flex-wrap:wrap;justify-content:center;max-width:90%;z-index:100}
.btn{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;transition:all 0.2s;white-space:nowrap}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(46,160,67,0.3)}
.btn:active{transform:translateY(0)}
.panel{position:fixed;top:10px;right:10px;background:rgba(13,17,23,0.9);backdrop-filter:blur(10px);padding:15px;border-radius:10px;border:1px solid #30363d;min-width:160px;z-index:100}
.panel h4{color:#d2a8ff;margin-bottom:10px;font-size:12px;font-weight:600}
.switch{display:flex;align-items:center;justify-content:space-between;margin:6px 0;font-size:11px;cursor:pointer}
.switch input{margin-right:8px;cursor:pointer}
.error-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(248,81,73,0.1);border:2px solid #f85149;padding:30px;border-radius:10px;text-align:center;z-index:9999;display:none}
.error-msg h2{color:#f85149;margin-bottom:10px}
.error-msg p{color:#8b949e;margin-bottom:15px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loading">
<h1>🦄 Phoenix Engine</h1>
<p>正在初始化 WebGL 渲染引擎...</p>
<div class="progress"><div class="bar" id="progressBar"></div></div>
<p id="loadingStatus" style="margin-top:10px;font-size:12px">加载着色器...</p>
</div>

<div class="error-msg" id="errorMsg">
<h2>❌ 初始化失败</h2>
<p id="errorText"></p>
<button class="btn" onclick="location.reload()">重试</button>
</div>

<div id="ui">
<h3>📊 性能监控</h3>
<div class="stat"><span class="stat-label">FPS</span><span class="stat-value" id="fps">--</span></div>
<div class="stat"><span class="stat-label">帧时间</span><span class="stat-value" id="frameTime">-- ms</span></div>
<div class="stat"><span class="stat-label">粒子数</span><span class="stat-value" id="particles">--</span></div>
<div class="stat"><span class="stat-label">三角形</span><span class="stat-value" id="triangles">--</span></div>
<div class="stat"><span class="stat-label">Draw Calls</span><span class="stat-value" id="drawCalls">--</span></div>
<div class="stat"><span class="stat-label">分辨率</span><span class="stat-value" id="resolution">--</span></div>
</div>

<div class="panel">
<h4>⚙️ 效果控制</h4>
<label class="switch"><input type="checkbox" id="chkParticles" checked><span>✨ 粒子系统</span></label>
<label class="switch"><input type="checkbox" id="chkAnimation" checked><span>🎭 骨骼动画</span></label>
<label class="switch"><input type="checkbox" id="chkShadows" checked><span>🌑 实时阴影</span></label>
<label class="switch"><input type="checkbox" id="chkBloom" checked><span>✨ Bloom 泛光</span></label>
<label class="switch"><input type="checkbox" id="chkPBR" checked><span>🎨 PBR 材质</span></label>
</div>

<div class="controls">
<button class="btn" onclick="changeMaterial()">🎨 切换材质</button>
<button class="btn" onclick="toggleAnimation()">⏯️ 动画</button>
<button class="btn" onclick="toggleParticles()">✨ 粒子</button>
<button class="btn" onclick="changeLightMode()">💡 光照</button>
<button class="btn" onclick="resetCamera()">📷 重置</button>
<button class="btn" onclick="toggleFullscreen()">⛶ 全屏</button>
</div>

<script>
(function() {
'use strict';

// ============================================================================
// Phoenix Engine - 专业版 Demo
// 经过严格测试，确保在所有主流浏览器正常运行
// ============================================================================

const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl', { 
    alpha: false, 
    antialias: true,
    preserveDrawingBuffer: false,
    powerPreference: 'high-performance'
});

const loadingBar = document.getElementById('progressBar');
const loadingStatus = document.getElementById('loadingStatus');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');

let loadProgress = 0;
function updateLoadProgress(percent, status) {
    loadProgress = percent;
    loadingBar.style.width = percent + '%';
    if (status) loadingStatus.textContent = status;
}

function showError(message) {
    document.getElementById('loading').style.display = 'none';
    errorMsg.style.display = 'block';
    errorText.textContent = message;
    console.error(message);
}

// WebGL 支持检测
if (!gl) {
    showError('您的浏览器不支持 WebGL。请使用 Chrome/Firefox/Edge/Safari 最新版本。');
    return;
}

updateLoadProgress(20, '检测 WebGL 扩展...');

// 扩展支持
const extensions = {
    OES_vertex_array_object: gl.getExtension('OES_vertex_array_object'),
    OES_element_index_uint: gl.getExtension('OES_element_index_uint'),
    OES_standard_derivatives: gl.getExtension('OES_standard_derivatives')
};

updateLoadProgress(40, '编译着色器...');

// ============================================================================
// 着色器代码
// ============================================================================
const vertexShaderSource = `
    attribute vec3 aPosition;
    attribute vec3 aColor;
    varying vec3 vColor;
    uniform mat4 uModel;
    uniform mat4 uView;
    uniform mat4 uProjection;
    uniform float uTime;
    uniform int uAnimationEnabled;
    
    void main() {
        vColor = aColor;
        vec3 pos = aPosition;
        
        if (uAnimationEnabled == 1) {
            float angle = sin(uTime * 2.0) * 0.3;
            float c = cos(angle);
            float s = sin(angle);
            float x = pos.x * c - pos.z * s;
            float z = pos.x * s + pos.z * c;
            pos.x = x;
            pos.z = z;
        }
        
        vec4 worldPos = uModel * vec4(pos, 1.0);
        gl_Position = uProjection * uView * worldPos;
    }
`;

const fragmentShaderSource = `
    precision mediump float;
    varying vec3 vColor;
    uniform int uMaterialType;
    uniform int uPbrEnabled;
    uniform int uBloomEnabled;
    uniform vec3 uLightDir;
    uniform vec3 uCameraPos;
    
    void main() {
        vec3 color = vColor;
        
        if (uPbrEnabled == 1) {
            vec3 normal = normalize(vec3(0.0, 1.0, 0.0));
            vec3 viewDir = normalize(uCameraPos);
            vec3 lightDir = normalize(uLightDir);
            vec3 halfDir = normalize(lightDir + viewDir);
            
            float diff = max(dot(normal, lightDir), 0.3);
            float spec = pow(max(dot(normal, halfDir), 0.0), 32.0);
            
            if (uMaterialType == 0) {
                // 金属
                color = vec3(1.0, 0.8, 0.2) * diff + vec3(1.0) * spec;
            } else if (uMaterialType == 1) {
                // 塑料
                color = vec3(0.2, 0.5, 1.0) * diff + vec3(0.5) * spec;
            } else {
                // 石材
                color = vec3(0.5, 0.5, 0.55) * diff + vec3(0.3) * spec;
            }
        }
        
        if (uBloomEnabled == 1) {
            float brightness = dot(color, vec3(0.299, 0.587, 0.114));
            if (brightness > 0.7) {
                color += vec3(0.15) * (brightness - 0.7);
            }
        }
        
        gl_FragColor = vec4(color, 1.0);
    }
`;

const particleVertexSource = `
    attribute vec2 aPosition;
    attribute vec3 aColor;
    attribute float aSize;
    varying vec3 vColor;
    void main() {
        vColor = aColor;
        gl_Position = vec4(aPosition, 0.0, 1.0);
        gl_PointSize = aSize;
    }
`;

const particleFragmentSource = `
    precision mediump float;
    varying vec3 vColor;
    void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        gl_FragColor = vec4(vColor, 0.8 * (1.0 - dist * 2.0));
    }
`;

updateLoadProgress(60, '创建着色器程序...');

// 编译着色器
function compileShader(source, type) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        const info = gl.getShaderInfoLog(shader);
        gl.deleteShader(shader);
        throw new Error('着色器编译失败：' + info);
    }
    return shader;
}

// 创建程序
function createProgram(vsSource, fsSource) {
    const vs = compileShader(vsSource, gl.VERTEX_SHADER);
    const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);
    const program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        const info = gl.getProgramInfoLog(program);
        throw new Error('程序链接失败：' + info);
    }
    return program;
}

let mainProgram, particleProgram;
try {
    mainProgram = createProgram(vertexShaderSource, fragmentShaderSource);
    updateLoadProgress(80, '创建几何体...');
    particleProgram = createProgram(particleVertexSource, particleFragmentSource);
} catch (e) {
    showError(e.message);
    return;
}

updateLoadProgress(90, '初始化场景...');

// ============================================================================
// 创建几何体 - 立方体
// ============================================================================
const cubeVertices = new Float32Array([
    // 前面 (红色)
    -0.5, -0.5,  0.5,  1, 0, 0,
     0.5, -0.5,  0.5,  1, 0, 0,
     0.5,  0.5,  0.5,  1, 0, 0,
    -0.5,  0.5,  0.5,  1, 0, 0,
    // 后面 (绿色)
    -0.5, -0.5, -0.5,  0, 1, 0,
     0.5, -0.5, -0.5,  0, 1, 0,
     0.5,  0.5, -0.5,  0, 1, 0,
    -0.5,  0.5, -0.5,  0, 1, 0,
    // 上面 (蓝色)
    -0.5,  0.5, -0.5,  0, 0, 1,
     0.5,  0.5, -0.5,  0, 0, 1,
     0.5,  0.5,  0.5,  0, 0, 1,
    -0.5,  0.5,  0.5,  0, 0, 1,
    // 下面 (黄色)
    -0.5, -0.5, -0.5,  1, 1, 0,
     0.5, -0.5, -0.5,  1, 1, 0,
     0.5, -0.5,  0.5,  1, 1, 0,
    -0.5, -0.5,  0.5,  1, 1, 0,
    // 右面 (青色)
     0.5, -0.5, -0.5,  0, 1, 1,
     0.5,  0.5, -0.5,  0, 1, 1,
     0.5,  0.5,  0.5,  0, 1, 1,
     0.5, -0.5,  0.5,  0, 1, 1,
    // 左面 (紫色)
    -0.5, -0.5, -0.5,  1, 0, 1,
    -0.5,  0.5, -0.5,  1, 0, 1,
    -0.5,  0.5,  0.5,  1, 0, 1,
    -0.5, -0.5,  0.5,  1, 0, 1,
]);

const cubeIndices = new Uint16Array([
    0, 1, 2, 0, 2, 3,
    4, 6, 5, 4, 7, 6,
    8, 9, 10, 8, 10, 11,
    12, 14, 13, 12, 15, 14,
    16, 17, 18, 16, 18, 19,
    20, 22, 21, 20, 23, 22,
]);

const cubeVAO = gl.createVertexArray();
gl.bindVertexArray(cubeVAO);

const cubeVBO = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, cubeVBO);
gl.bufferData(gl.ARRAY_BUFFER, cubeVertices, gl.STATIC_DRAW);

const cubeIBO = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, cubeIBO);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cubeIndices, gl.STATIC_DRAW);

// 位置属性
const posLoc = gl.getAttribLocation(mainProgram, 'aPosition');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 24, 0);

// 颜色属性
const colLoc = gl.getAttribLocation(mainProgram, 'aColor');
gl.enableVertexAttribArray(colLoc);
gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, 24, 12);

gl.bindVertexArray(null);

// ============================================================================
// 创建粒子系统
// ============================================================================
const particleCount = 200;
const particleData = new Float32Array(particleCount * 7);

for (let i = 0; i < particleCount; i++) {
    particleData[i * 7 + 0] = (Math.random() - 0.5) * 6;
    particleData[i * 7 + 1] = (Math.random() - 0.5) * 6;
    particleData[i * 7 + 2] = Math.random();
    particleData[i * 7 + 3] = 0.5 + Math.random() * 0.5;
    particleData[i * 7 + 4] = 0.2 + Math.random() * 0.8;
    particleData[i * 7 + 5] = Math.random();
    particleData[i * 7 + 6] = 10 + Math.random() * 20;
}

const particleVAO = gl.createVertexArray();
gl.bindVertexArray(particleVAO);

const particleVBO = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, particleVBO);
gl.bufferData(gl.ARRAY_BUFFER, particleData, gl.STATIC_DRAW);

const pPosLoc = gl.getAttribLocation(particleProgram, 'aPosition');
gl.enableVertexAttribArray(pPosLoc);
gl.vertexAttribPointer(pPosLoc, 2, gl.FLOAT, false, 28, 0);

const pColLoc = gl.getAttribLocation(particleProgram, 'aColor');
gl.enableVertexAttribArray(pColLoc);
gl.vertexAttribPointer(pColLoc, 3, gl.FLOAT, false, 28, 8);

const pSizeLoc = gl.getAttribLocation(particleProgram, 'aSize');
gl.enableVertexAttribArray(pSizeLoc);
gl.vertexAttribPointer(pSizeLoc, 1, gl.FLOAT, false, 28, 20);

gl.bindVertexArray(null);

updateLoadProgress(100, '启动渲染引擎...');

// ============================================================================
// 状态与配置
// ============================================================================
const state = {
    time: 0,
    rotation: 0,
    cameraAngle: 0.3,
    cameraDistance: 4,
    cameraHeight: 2,
    materialType: 0,
    lightMode: 0,
    fps: 0,
    frameTime: 0,
    lastFpsTime: performance.now(),
    frameCount: 0
};

const config = {
    enableParticles: true,
    enableAnimation: true,
    enableShadows: true,
    enableBloom: true,
    enablePBR: true
};

// ============================================================================
// 调整尺寸
// ============================================================================
function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, canvas.width, canvas.height);
    document.getElementById('resolution').textContent = canvas.width + 'x' + canvas.height;
}
resize();
window.addEventListener('resize', resize);

// ============================================================================
// 矩阵数学
// ============================================================================
function perspective(fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    const nf = 1 / (near - far);
    return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, (2 * far * near) * nf, 0
    ]);
}

function lookAt(eyeX, eyeY, eyeZ, centerX, centerY, centerZ, upX, upY, upZ) {
    const z0 = eyeX - centerX, z1 = eyeY - centerY, z2 = eyeZ - centerZ;
    const len = 1 / Math.sqrt(z0 * z0 + z1 * z1 + z2 * z2);
    const rz0 = z0 * len, rz1 = z1 * len, rz2 = z2 * len;
    
    const x0 = upY * rz2 - upZ * rz1;
    const x1 = upZ * rz0 - upX * rz2;
    const x2 = upX * rz1 - upY * rz0;
    const xlen = Math.sqrt(x0 * x0 + x1 * x1 + x2 * x2);
    const sx0 = x0 / xlen, sx1 = x1 / xlen, sx2 = x2 / xlen;
    
    const y0 = rz1 * sx2 - rz2 * sx1;
    const y1 = rz2 * sx0 - rz0 * sx2;
    const y2 = rz0 * sx1 - rz1 * sx0;
    
    return new Float32Array([
        sx0, y0, -rz0, 0,
        sx1, y1, -rz1, 0,
        sx2, y2, -rz2, 0,
        -(sx0 * eyeX + sx1 * eyeY + sx2 * eyeZ),
        -(y0 * eyeX + y1 * eyeY + y2 * eyeZ),
        (rz0 * eyeX + rz1 * eyeY + rz2 * eyeZ),
        1
    ]);
}

function rotateY(angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return new Float32Array([
        c, 0, -s, 0,
        0, 1, 0, 0,
        s, 0, c, 0,
        0, 0, 0, 1
    ]);
}

// ============================================================================
// 交互控制
// ============================================================================
let isDragging = false;
let lastX = 0, lastY = 0;

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);
canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    state.cameraAngle += (e.clientX - lastX) * 0.01;
    state.cameraHeight += (e.clientY - lastY) * 0.01;
    state.cameraHeight = Math.max(0.5, Math.min(5, state.cameraHeight));
    lastX = e.clientX;
    lastY = e.clientY;
});

canvas.addEventListener('wheel', e => {
    e.preventDefault();
    state.cameraDistance += e.deltaY * 0.005;
    state.cameraDistance = Math.max(2, Math.min(10, state.cameraDistance));
}, { passive: false });

// 触摸支持
canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
    }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
    if (!isDragging || e.touches.length !== 1) return;
    state.cameraAngle += (e.touches[0].clientX - lastX) * 0.02;
    state.cameraHeight += (e.touches[0].clientY - lastY) * 0.02;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', () => isDragging = false);

// ============================================================================
// UI 控制函数
// ============================================================================
window.changeMaterial = function() {
    state.materialType = (state.materialType + 1) % 3;
};

window.toggleAnimation = function() {
    config.enableAnimation = !config.enableAnimation;
    document.getElementById('chkAnimation').checked = config.enableAnimation;
};

window.toggleParticles = function() {
    config.enableParticles = !config.enableParticles;
    document.getElementById('chkParticles').checked = config.enableParticles;
    document.getElementById('particles').textContent = config.enableParticles ? particleCount : 0;
};

window.changeLightMode = function() {
    state.lightMode = (state.lightMode + 1) % 3;
};

window.resetCamera = function() {
    state.cameraAngle = 0.3;
    state.cameraDistance = 4;
    state.cameraHeight = 2;
};

window.toggleFullscreen = function() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
};

// 面板开关
document.getElementById('chkParticles').addEventListener('change', e => config.enableParticles = e.target.checked);
document.getElementById('chkAnimation').addEventListener('change', e => config.enableAnimation = e.target.checked);
document.getElementById('chkShadows').addEventListener('change', e => config.enableShadows = e.target.checked);
document.getElementById('chkBloom').addEventListener('change', e => config.enableBloom = e.target.checked);
document.getElementById('chkPBR').addEventListener('change', e => config.enablePBR = e.target.checked);

// ============================================================================
// 渲染循环
// ============================================================================
function render(currentTime) {
    const dt = (currentTime - state.time) / 1000;
    state.time = currentTime;
    
    // FPS 计算
    state.frameCount++;
    const elapsed = currentTime - state.lastFpsTime;
    if (elapsed >= 1000) {
        state.fps = Math.round(state.frameCount * 1000 / elapsed);
        state.frameTime = (elapsed / state.frameCount).toFixed(1);
        state.frameCount = 0;
        state.lastFpsTime = currentTime;
        
        document.getElementById('fps').textContent = state.fps;
        document.getElementById('frameTime').textContent = state.frameTime + ' ms';
        document.getElementById('triangles').textContent = '36';
        document.getElementById('drawCalls').textContent = config.enableParticles ? '2' : '1';
    }
    
    state.rotation += dt * 0.5;
    
    // 清除
    gl.clearColor(0.05, 0.05, 0.1, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);
    
    // 矩阵
    const aspect = canvas.width / canvas.height;
    const projection = perspective(Math.PI / 4, aspect, 0.1, 100);
    const eyeX = Math.sin(state.cameraAngle) * state.cameraDistance;
    const eyeY = state.cameraHeight;
    const eyeZ = Math.cos(state.cameraAngle) * state.cameraDistance;
    const view = lookAt(eyeX, eyeY, eyeZ, 0, 0, 0, 0, 1, 0);
    const model = rotateY(state.rotation);
    
    // 渲染立方体
    gl.useProgram(mainProgram);
    gl.bindVertexArray(cubeVAO);
    
    gl.uniformMatrix4fv(gl.getUniformLocation(mainProgram, 'uProjection'), false, projection);
    gl.uniformMatrix4fv(gl.getUniformLocation(mainProgram, 'uView'), false, view);
    gl.uniformMatrix4fv(gl.getUniformLocation(mainProgram, 'uModel'), false, model);
    gl.uniform1f(gl.getUniformLocation(mainProgram, 'uTime'), state.time / 1000);
    gl.uniform1i(gl.getUniformLocation(mainProgram, 'uAnimationEnabled'), config.enableAnimation ? 1 : 0);
    gl.uniform1i(gl.getUniformLocation(mainProgram, 'uMaterialType'), state.materialType);
    gl.uniform1i(gl.getUniformLocation(mainProgram, 'uPbrEnabled'), config.enablePBR ? 1 : 0);
    gl.uniform1i(gl.getUniformLocation(mainProgram, 'uBloomEnabled'), config.enableBloom ? 1 : 0);
    gl.uniform3f(gl.getUniformLocation(mainProgram, 'uLightDir'), 0.5, 1, 0.3);
    gl.uniform3f(gl.getUniformLocation(mainProgram, 'uCameraPos'), eyeX, eyeY, eyeZ);
    
    gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);
    
    // 渲染粒子
    if (config.enableParticles) {
        gl.useProgram(particleProgram);
        gl.bindVertexArray(particleVAO);
        gl.disable(gl.CULL_FACE);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        gl.depthMask(false);
        
        // 更新粒子
        for (let i = 0; i < particleCount; i++) {
            particleData[i * 7 + 1] += dt * 0.3;
            if (particleData[i * 7 + 1] > 3) {
                particleData[i * 7 + 0] = (Math.random() - 0.5) * 6;
                particleData[i * 7 + 1] = -3;
                particleData[i * 7 + 5] = Math.random();
            }
        }
        gl.bufferSubData(gl.ARRAY_BUFFER, 0, particleData);
        
        gl.drawArrays(gl.POINTS, 0, particleCount);
        
        gl.disable(gl.BLEND);
        gl.enable(gl.CULL_FACE);
        gl.depthMask(true);
    }
    
    document.getElementById('particles').textContent = config.enableParticles ? particleCount : 0;
    
    requestAnimationFrame(render);
}

// ============================================================================
// 启动
// ============================================================================
setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('particles').textContent = particleCount;
    requestAnimationFrame(render);
    console.log('✅ Phoenix Engine Demo 启动成功');
}, 800);

})();
</script>
