## 📜 辅助脚本

### 安全扫描脚本

```bash
#!/bin/bash
# scripts/security-scan.sh

set -e

echo "🔒 Phoenix Engine Security Scan"
echo "================================"
echo ""

# Colors
RED='\033[0;31m'
GREEN='\033[0;32m'
YELLOW='\033[1;33m'
NC='\033[0m' # No Color

ERRORS=0

# 1. Rust 依赖审计
echo "[1/6] Auditing Rust dependencies..."
cd rust-security-core
if cargo audit 2>&1 | grep -q "Vulnerability"; then
    echo -e "${RED}❌ Rust audit found vulnerabilities${NC}"
    ERRORS=$((ERRORS + 1))
else
    echo -e "${GREEN}✅ Rust dependencies secure${NC}"
fi
cd ..

# 2. C++ 静态分析
echo "[2/6] Running cppcheck..."
if cppcheck --enable=all --inconclusive --error-exitcode=1 src/ include/ 2>/dev/null; then
    echo -e "${GREEN}✅ C++ static analysis passed${NC}"
else
    echo -e "${YELLOW}⚠️ C++ static analysis found issues${NC}"
fi

# 3. 模糊测试 (快速模式)
echo "[3/6] Running quick fuzz tests..."
cd security-audit/fuzz
for fuzzer in ffi_decrypt_fuzzer crypto_decrypt_fuzzer crypto_encrypt_fuzzer audit_logger_fuzzer; do
    echo "  Running $fuzzer..."
    if cargo fuzz run $fuzzer -- -max_total_time=30 2>&1 | grep -q "crash"; then
        echo -e "${RED}  ❌ $fuzzer found crash${NC}"
        ERRORS=$((ERRORS + 1))
    else
        echo -e "${GREEN}  ✅ $fuzzer passed${NC}"
    fi
done
cd ../..

# 4. 代码覆盖率
echo "[4/6] Running coverage tests..."
mkdir -p build-coverage && cd build-coverage
cmake -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug .. >/dev/null
cmake --build . >/dev/null 2>&1
if ctest --output-on-failure >/dev/null 2>&1; then
    echo -e "${GREEN}✅ All tests passed${NC}"
else
    echo -e "${RED}❌ Some tests failed${NC}"
    ERRORS=$((ERRORS + 1))
fi
cd ..

# 5. 生成覆盖率报告
echo "[5/6] Generating coverage report..."
gcovr --html-coverage coverage-report.html 2>/dev/null || true
echo -e "${GREEN}✅ Coverage report generated${NC}"

# 6. 生成安全报告
echo "[6/6] Generating security report..."
./scripts/generate-security-report.sh
echo -e "${GREEN}✅ Security report generated${NC}"

echo ""
echo "================================"
if [ $ERRORS -eq 0 ]; then
    echo -e "${GREEN}✅ Security scan complete - All checks passed${NC}"
    exit 0
else
    echo -e "${RED}❌ Security scan complete - $ERRORS errors found${NC}"
    exit 1
fi
```

