### 4. 持续模糊测试工作流

```yaml
# .github/workflows/fuzzing.yml
name: 🧪 Continuous Fuzzing

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration per target (seconds)'
        required: true
        default: '3600'

jobs:
  continuous-fuzzing:
    name: Continuous Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      
      - name: Download existing corpus
        uses: actions/download-artifact@v4
        with:
          name: fuzz-corpus
          path: security-audit/fuzz/corpus/
        continue-on-error: true
      
      - name: Run FFI Decrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run ffi_decrypt_fuzzer \
            -- -max_total_time=${{ github.event.inputs.duration || 3600 }} \
            -artifact_prefix=artifacts/ffi_decrypt/
      
      - name: Run Crypto Decrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run crypto_decrypt_fuzzer \
            -- -max_total_time=${{ github.event.inputs.duration || 3600 }} \
            -artifact_prefix=artifacts/crypto_decrypt/
      
      - name: Run Crypto Encrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run crypto_encrypt_fuzzer \
            -- -max_total_time=${{ github.event.inputs.duration || 3600 }} \
            -artifact_prefix=artifacts/crypto_encrypt/
      
      - name: Run Audit Logger Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run audit_logger_fuzzer \
            -- -max_total_time=${{ github.event.inputs.duration || 3600 }} \
            -artifact_prefix=artifacts/audit_logger/
      
      - name: Upload new corpus
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: security-audit/fuzz/corpus/
      
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: security-audit/fuzz/artifacts/
      
      - name: Create issue on crash
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Fuzzer Crash Detected',
              body: 'A fuzzer has detected a crash. Please review the artifacts.',
              labels: ['security', 'bug', 'critical']
            });
```

