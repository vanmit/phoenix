### 5. MISRA 合规检查工作流

```yaml
# .github/workflows/misra-compliance.yml
name: 📋 MISRA C++ Compliance

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'

jobs:
  misra-check:
    name: MISRA Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run MISRA checker
        run: |
          ./scripts/check-misra.sh --strict --output=misra-report.json
      
      - name: Upload MISRA report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: misra-report.json
      
      - name: Check compliance threshold
        run: |
          ./scripts/check-misra-threshold.sh \
            --input=misra-report.json \
            --required=95 \
            --mandatory=100
```

