### 3. 依赖漏洞扫描工作流

```yaml
# .github/workflows/dependency-audit.yml
name: 📦 Dependency Audit

on:
  schedule:
    - cron: '0 6 * * *'  # 每天凌晨 6 点
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'CMakeLists.txt'
      - 'cmake/**'

jobs:
  rust-audit:
    name: Rust Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run cargo audit
        run: |
          cd rust-security-core
          cargo audit
      
      - name: Install cargo-outdated
        run: cargo install cargo-outdated
      
      - name: Check outdated dependencies
        run: |
          cd rust-security-core
          cargo outdated --root-deps-only

  cpp-audit:
    name: C++ Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      
      - name: Run OSV-Scanner
        run: |
          osv-scanner \
            --lockfile=CMakeLists.txt \
            --format=markdown \
            --output=cpp-osv-report.md
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cpp-osv-report
          path: cpp-osv-report.md

  create-issue:
    name: Create Security Issue
    needs: [rust-audit, cpp-audit]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create security issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Dependency Vulnerability Detected',
              body: 'A dependency vulnerability was detected in the automated audit. Please review and update.',
              labels: ['security', 'dependencies', 'high-priority']
            });
```

