## 🔄 GitHub Actions 工作流

### 1. 主安全审计工作流

```yaml
# .github/workflows/security.yml
name: 🔒 Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨 2 点
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: '1.75'
  CMAKE_VERSION: '3.26'

jobs:
  # ==========================================================================
  # 1. Rust 静态分析
  # ==========================================================================
  rust-static-analysis:
    name: Rust Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
      
      - name: Run rustfmt
        run: |
          cd rust-security-core
          cargo fmt -- --check
      
      - name: Run clippy
        run: |
          cd rust-security-core
          cargo clippy -- -D warnings -D clippy::all -D clippy::pedantic
      
      - name: Run cargo audit
        run: |
          cargo install cargo-audit
          cd rust-security-core
          cargo audit

  # ==========================================================================
  # 2. C++ 静态分析
  # ==========================================================================
  cpp-static-analysis:
    name: C++ Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck
      
      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --inconclusive \
            --error-exitcode=1 \
            --xml --xml-version=2 \
            --output-file=cppcheck-report.xml \
            src/ include/
      
      - name: Upload cppcheck report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  # ==========================================================================
  # 3. 模糊测试
  # ==========================================================================
  fuzzing:
    name: Fuzzing Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      
      - name: Run FFI Decrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run ffi_decrypt_fuzzer -- -max_total_time=120
      
      - name: Run Crypto Decrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run crypto_decrypt_fuzzer -- -max_total_time=120
      
      - name: Run Crypto Encrypt Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run crypto_encrypt_fuzzer -- -max_total_time=120
      
      - name: Run Audit Logger Fuzzer
        run: |
          cd security-audit/fuzz
          cargo fuzz run audit_logger_fuzzer -- -max_total_time=120
      
      - name: Upload corpus
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fuzz-corpus
          path: security-audit/fuzz/corpus/

  # ==========================================================================
  # 4. 内存安全 (ASAN/UBSAN)
  # ==========================================================================
  memory-safety:
    name: Memory Safety (ASAN/UBSAN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build
      
      - name: Configure with sanitizers
        run: |
          mkdir build-asan && cd build-asan
          cmake \
            -G Ninja \
            -DENABLE_ASAN=ON \
            -DENABLE_UBSAN=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            ..
      
      - name: Build
        run: cmake --build build-asan
      
      - name: Run tests
        run: |
          cd build-asan
          ctest --output-on-failure --parallel $(nproc)

  # ==========================================================================
  # 5. 线程安全 (TSAN)
  # ==========================================================================
  thread-safety:
    name: Thread Safety (TSAN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure with TSAN
        run: |
          mkdir build-tsan && cd build-tsan
          cmake \
            -G Ninja \
            -DENABLE_TSAN=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            ..
      
      - name: Build
        run: cmake --build build-tsan
      
      - name: Run tests
        run: |
          cd build-tsan
          ctest --output-on-failure --parallel $(nproc)

  # ==========================================================================
  # 6. 依赖审计
  # ==========================================================================
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Install OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest
      
      - name: Audit Rust dependencies
        run: |
          cd rust-security-core
          cargo audit
      
      - name: Run OSV-Scanner
        run: |
          osv-scanner \
            --lockfile=rust-security-core/Cargo.lock \
            --format=markdown \
            --output=osv-report.md
      
      - name: Upload OSV report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: osv-report
          path: osv-report.md

  # ==========================================================================
  # 7. 安全报告生成
  # ==========================================================================
  security-report:
    name: Generate Security Report
    needs: [rust-static-analysis, cpp-static-analysis, fuzzing, memory-safety, thread-safety, dependency-audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Generate report
        run: |
          ./scripts/generate-security-report.sh
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-final/reports/
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-final/reports/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔒 Security Audit Results\n\n${report}`
            });
```

