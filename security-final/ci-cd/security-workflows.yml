### 2. 内存安全验证工作流

```yaml
# .github/workflows/memory-safety.yml
name: 🛡️ Memory Safety Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'rust-security-core/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'rust-security-core/**'

jobs:
  asan-test:
    name: ASAN Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with ASAN
        run: |
          mkdir build-asan && cd build-asan
          cmake -DENABLE_ASAN=ON -DENABLE_UBSAN=ON -DCMAKE_BUILD_TYPE=Debug ..
          cmake --build . -j$(nproc)
      
      - name: Run tests
        run: |
          cd build-asan
          ctest --output-on-failure
      
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asan-logs
          path: build-asan/Testing/

  tsan-test:
    name: TSAN Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with TSAN
        run: |
          mkdir build-tsan && cd build-tsan
          cmake -DENABLE_TSAN=ON -DCMAKE_BUILD_TYPE=Debug ..
          cmake --build . -j$(nproc)
      
      - name: Run tests
        run: |
          cd build-tsan
          ctest --output-on-failure

  valgrind-test:
    name: Valgrind Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Valgrind
        run: sudo apt-get install -y valgrind
      
      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Debug ..
          cmake --build .
      
      - name: Run Valgrind
        run: |
          cd build
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            ./bin/test_security
```

