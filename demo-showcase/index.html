<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Phoenix Engine - WASM Demo</title>
    <link rel="stylesheet" href="styles/mobile.css">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
</head>
<body>
    <div id="app-container">
        <!-- Canvas Container -->
        <div id="canvas-wrapper">
            <canvas id="glcanvas" tabindex="1"></canvas>
            
            <!-- Loading Overlay -->
            <div id="loading-overlay">
                <div class="loader">
                    <div class="phoenix-logo">
                        <svg viewBox="0 0 100 100" width="80" height="80">
                            <path d="M50 10 L60 30 L80 30 L65 45 L70 65 L50 55 L30 65 L35 45 L20 30 L40 30 Z" fill="#ff6b35"/>
                        </svg>
                    </div>
                    <div class="loading-text">Phoenix Engine</div>
                    <div class="loading-bar">
                        <div class="loading-progress" id="loading-progress"></div>
                    </div>
                    <div class="loading-status" id="loading-status">初始化 WASM...</div>
                </div>
            </div>

            <!-- Performance HUD -->
            <div id="performance-hud" class="hud-panel">
                <div class="hud-header">
                    <span>📊 性能监控</span>
                    <button class="hud-toggle" id="hud-toggle">▼</button>
                </div>
                <div class="hud-content" id="hud-content">
                    <div class="hud-row">
                        <span class="hud-label">FPS</span>
                        <span class="hud-value" id="fps-value">--</span>
                        <span class="hud-unit">fps</span>
                    </div>
                    <div class="hud-row">
                        <span class="hud-label">帧时间</span>
                        <span class="hud-value" id="frame-time-value">--</span>
                        <span class="hud-unit">ms</span>
                    </div>
                    <div class="hud-row">
                        <span class="hud-label">Draw Calls</span>
                        <span class="hud-value" id="draw-calls-value">--</span>
                        <span class="hud-unit"></span>
                    </div>
                    <div class="hud-row">
                        <span class="hud-label">三角形</span>
                        <span class="hud-value" id="triangles-value">--</span>
                        <span class="hud-unit">K</span>
                    </div>
                    <div class="hud-row">
                        <span class="hud-label">内存</span>
                        <span class="hud-value" id="memory-value">--</span>
                        <span class="hud-unit">MB</span>
                    </div>
                    <div class="frame-time-graph" id="frame-time-graph"></div>
                </div>
            </div>

            <!-- Control Panel -->
            <div id="control-panel" class="hud-panel">
                <div class="hud-header">
                    <span>🎮 控制面板</span>
                    <button class="hud-toggle" id="control-toggle">▼</button>
                </div>
                <div class="hud-content" id="control-content">
                    <!-- Camera Mode -->
                    <div class="control-section">
                        <div class="section-title">相机模式</div>
                        <div class="button-group">
                            <button class="control-btn active" data-camera="orbit">轨道</button>
                            <button class="control-btn" data-camera="fps">第一人称</button>
                            <button class="control-btn" data-camera="third">第三人称</button>
                        </div>
                    </div>

                    <!-- PBR Settings -->
                    <div class="control-section">
                        <div class="section-title">PBR 材质</div>
                        <div class="slider-control">
                            <label>金属度</label>
                            <input type="range" id="metallic-slider" min="0" max="1" step="0.01" value="0.5">
                            <span class="slider-value" id="metallic-value">0.50</span>
                        </div>
                        <div class="slider-control">
                            <label>粗糙度</label>
                            <input type="range" id="roughness-slider" min="0" max="1" step="0.01" value="0.5">
                            <span class="slider-value" id="roughness-value">0.50</span>
                        </div>
                        <div class="slider-control">
                            <label>清漆层</label>
                            <input type="range" id="clearcoat-slider" min="0" max="1" step="0.01" value="0.0">
                            <span class="slider-value" id="clearcoat-value">0.00</span>
                        </div>
                    </div>

                    <!-- Lighting -->
                    <div class="control-section">
                        <div class="section-title">光照设置</div>
                        <div class="toggle-control">
                            <label>方向光</label>
                            <label class="switch">
                                <input type="checkbox" id="directional-light" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>点光源</label>
                            <label class="switch">
                                <input type="checkbox" id="point-light" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>聚光灯</label>
                            <label class="switch">
                                <input type="checkbox" id="spot-light" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>实时阴影</label>
                            <label class="switch">
                                <input type="checkbox" id="shadows" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- Post Processing -->
                    <div class="control-section">
                        <div class="section-title">后处理效果</div>
                        <div class="toggle-control">
                            <label>Bloom</label>
                            <label class="switch">
                                <input type="checkbox" id="bloom" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>Tone Mapping</label>
                            <label class="switch">
                                <input type="checkbox" id="tone-mapping" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>SSAO</label>
                            <label class="switch">
                                <input type="checkbox" id="ssao">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- Animation -->
                    <div class="control-section">
                        <div class="section-title">动画控制</div>
                        <div class="button-group">
                            <button class="control-btn active" data-anim="idle">待机</button>
                            <button class="control-btn" data-anim="walk">走路</button>
                            <button class="control-btn" data-anim="run">跑步</button>
                            <button class="control-btn" data-anim="jump">跳跃</button>
                        </div>
                        <div class="slider-control">
                            <label>混合速度</label>
                            <input type="range" id="blend-slider" min="0.1" max="1" step="0.05" value="0.3">
                            <span class="slider-value" id="blend-value">0.30</span>
                        </div>
                    </div>

                    <!-- Particles -->
                    <div class="control-section">
                        <div class="section-title">粒子系统</div>
                        <div class="toggle-control">
                            <label>火焰</label>
                            <label class="switch">
                                <input type="checkbox" id="particle-fire">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>烟雾</label>
                            <label class="switch">
                                <input type="checkbox" id="particle-smoke">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="toggle-control">
                            <label>火花</label>
                            <label class="switch">
                                <input type="checkbox" id="particle-sparks">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Gesture Hints -->
            <div id="gesture-hints">
                <div class="hint" id="hint-rotate">🔄 单指旋转</div>
                <div class="hint" id="hint-pan">✋ 双指平移</div>
                <div class="hint" id="hint-zoom">🔍 捏合缩放</div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error-overlay" class="hidden">
            <div class="error-content">
                <h2>⚠️ 加载错误</h2>
                <p id="error-message"></p>
                <button id="retry-btn">重试</button>
            </div>
        </div>
    </div>

    <!-- Use fixed version with improved error handling and debugging -->
    <script src="demo-wasm-fixed.js"></script>
    <!-- Original: <script src="demo-wasm.js"></script> -->
</body>
</html>
