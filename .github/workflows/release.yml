# Phoenix Engine - CI/CD Release Pipeline
# GitHub Actions workflow for automated releases

name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  CMAKE_VERSION: '3.20.0'
  NDK_VERSION: '25.2.9519653'

jobs:
  # Extract version from tag or input
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

  # Build for Windows
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install ninja
          
      - name: Configure
        run: |
          cmake -S . -B build/release -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DPHoenix_VERSION=${{ needs.version.outputs.version }}
          
      - name: Build
        run: cmake --build build/release --config Release
        
      - name: Package
        run: |
          cmake --install build/release --prefix "PhoenixEngine-${{ needs.version.outputs.version }}"
          Compress-Archive -Path "PhoenixEngine-*" -DestinationPath "phoenix-engine-${{ needs.version.outputs.version }}-windows-x64.zip"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: phoenix-engine-*-windows-x64.zip

  # Build for Linux
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev libwayland-dev
          
      - name: Configure
        run: |
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPHoenix_VERSION=${{ needs.version.outputs.version }}
          
      - name: Build
        run: cmake --build build/release
        
      - name: Create DEB package
        run: |
          mkdir -p release/packages/linux/deb
          # DEB packaging script
          ./release/scripts/create-deb.sh ${{ needs.version.outputs.version }}
          
      - name: Create AppImage
        run: |
          ./release/scripts/create-appimage.sh ${{ needs.version.outputs.version }}
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            release/packages/linux/deb/*.deb
            release/packages/linux/*.AppImage

  # Build for macOS
  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: brew install cmake ninja
          
      - name: Configure
        run: |
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DPHoenix_VERSION=${{ needs.version.outputs.version }}
          
      - name: Build
        run: cmake --build build/release
        
      - name: Create DMG
        run: |
          ./release/scripts/create-dmg.sh ${{ needs.version.outputs.version }}
          
      - name: Code sign (if certificates available)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            ./release/scripts/sign-macos.sh
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/packages/macos/*.dmg

  # Build for Android
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          
      - name: Build APK
        working-directory: examples/android/PhoenixEngine
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          
      - name: Build AAB
        working-directory: examples/android/PhoenixEngine
        run: ./gradlew bundleRelease
        
      - name: Sign APK (if keystore available)
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PWD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE" ]; then
            ./release/scripts/sign-android.sh
          fi
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: |
            examples/android/PhoenixEngine/build/outputs/apk/release/*.apk
            examples/android/PhoenixEngine/build/outputs/bundle/release/*.aab

  # Build for iOS
  build-ios:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build IPA
        working-directory: examples/ios/PhoenixEngine
        run: |
          xcodebuild -scheme PhoenixEngine \
            -configuration Release \
            -archivePath build/PhoenixEngine.xcarchive \
            archive
            
      - name: Export IPA (if certificates available)
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -n "$IOS_CERTIFICATE" ]; then
            ./release/scripts/export-ios-ipa.sh
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: examples/ios/PhoenixEngine/build/*.ipa

  # Build for Web/WASM
  build-web:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v12
        with:
          version: '3.1.45'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build WASM
        working-directory: wasm
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
          
      - name: Create NPM package
        working-directory: wasm
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version
          npm pack
          mv phoenix-engine-*.tgz ../release/packages/web/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-packages
          path: |
            release/packages/web/*.tgz
            wasm/dist/*

  # Create source package
  build-source:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create source archive
        run: |
          mkdir -p release/packages/source
          tar --exclude='.git' \
              --exclude='build' \
              --exclude='*.o' \
              --exclude='*.a' \
              -czf "release/packages/source/phoenix-engine-${{ needs.version.outputs.version }}-source.tar.gz" \
              .
              
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: release/packages/source/*.tar.gz

  # Generate checksums
  generate-checksums:
    needs: [build-windows, build-linux, build-macos, build-android, build-ios, build-web, build-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/packages
          
      - name: Generate checksums
        run: |
          cd release/packages
          find . -type f \( -name "*.zip" -o -name "*.deb" -o -name "*.AppImage" \
                           -o -name "*.dmg" -o -name "*.apk" -o -name "*.aab" \
                           -o -name "*.tgz" -o -name "*.tar.gz" \) \
            -exec sha256sum {} \; > checksums/SHA256SUMS.txt
          mkdir -p checksums
          mv SHA256SUMS.txt checksums/
          
      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/checksums/SHA256SUMS.txt

  # Create GitHub Release
  create-release:
    needs: [version, generate-checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/packages
          
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: release/checksums
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Phoenix Engine v${{ needs.version.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: |
            release/packages/windows/*.zip
            release/packages/linux/deb/*.deb
            release/packages/linux/*.AppImage
            release/packages/macos/*.dmg
            release/packages/android/*.apk
            release/packages/android/*.aab
            release/packages/ios/*.ipa
            release/packages/web/*.tgz
            release/packages/source/*.tar.gz
            release/checksums/SHA256SUMS.txt
          draft: false
          prerelease: false
          
  # Deploy documentation
  deploy-docs:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Build documentation
        run: |
          cd docs
          npm install
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build
          commit_message: 'Deploy docs for v${{ needs.version.outputs.version }}'

  # Publish to NPM
  publish-npm:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Publish to NPM
        working-directory: wasm
        run: |
          npm version ${{ needs.version.outputs.version }} --no-git-tag-version
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
