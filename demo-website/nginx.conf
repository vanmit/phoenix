# Phoenix Engine Demo Website - Nginx Configuration
# Place this in /etc/nginx/conf.d/showcase.conf or include in server block

server {
    listen 80;
    server_name phoenix-engine.com;  # Replace with your domain
    
    # Or for subpath deployment on port 3000:
    # listen 3000;
    # location /showcase/ {
    
    root /var/www/showcase;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/json application/xml+rss;
    gzip_level 6;
    
    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # HTML files - no cache for development
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Handle SPA routing (if needed)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # Access logging
    access_log /var/log/nginx/showcase.access.log;
    error_log /var/log/nginx/showcase.error.log;
    
    # HTTPS redirect (uncomment when SSL is configured)
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/phoenix-engine.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/phoenix-engine.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
}
