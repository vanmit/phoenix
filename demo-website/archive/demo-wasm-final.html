<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Engine - 真正的 WASM Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;overflow:hidden}
#canvas{display:block;width:100vw;height:100vh}
#loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading h1{color:#58a6ff;margin-bottom:20px}
#loading p{color:#8b949e;margin:5px 0}
.progress{width:300px;height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:15px}
.bar{height:100%;background:linear-gradient(90deg,#58a6ff,#3fb950);width:0;transition:width .3s}
#ui{position:fixed;top:10px;left:10px;background:rgba(13,17,23,.9);backdrop-filter:blur(10px);padding:15px;border-radius:10px;border:1px solid #30363d;min-width:180px;z-index:100}
#ui h3{color:#58a6ff;margin-bottom:12px;font-size:13px}
.stat{display:flex;justify-content:space-between;margin:6px 0;font-size:11px}
.stat-label{color:#8b949e}
.stat-value{color:#3fb950;font-weight:700}
.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;background:rgba(13,17,23,.9);padding:12px;border-radius:10px;border:1px solid #30363d;flex-wrap:wrap;justify-content:center;z-index:100}
.btn{background:linear-gradient(135deg,#238636,#2ea043);color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(46,160,67,.3)}
.panel{position:fixed;top:10px;right:10px;background:rgba(13,17,23,.9);padding:15px;border-radius:10px;border:1px solid #30363d;min-width:150px;z-index:100}
.panel h4{color:#d2a8ff;margin-bottom:10px;font-size:12px}
.switch{display:flex;align-items:center;justify-content:space-between;margin:6px 0;font-size:11px;cursor:pointer}
.switch input{margin-right:8px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="loading"><h1>🦄 Phoenix Engine</h1><p>加载 WASM 模块...</p><div class="progress"><div class="bar" id="bar"></div></div><p id="status">正在初始化...</p></div>
<div id="ui"><h3>📊 性能监控</h3><div class="stat"><span class="stat-label">FPS</span><span class="stat-value" id="fps">--</span></div><div class="stat"><span class="stat-label">帧时间</span><span class="stat-value" id="frameTime">-- ms</span></div><div class="stat"><span class="stat-label">三角形</span><span class="stat-value" id="tris">--</span></div><div class="stat"><span class="stat-label">Draw Calls</span><span class="stat-value" id="draws">--</span></div></div>
<div class="panel"><h4>⚙️ 效果</h4><label class="switch"><input type="checkbox" id="chkPBR" checked><span>PBR 材质</span></label><label class="switch"><input type="checkbox" id="chkBloom" checked><span>Bloom</span></label><label class="switch"><input type="checkbox" id="chkAnim" checked><span>动画</span></label></div>
<div class="controls"><button class="btn" onclick="changeMat()">🎨 材质</button><button class="btn" onclick="toggleAnim()">⏯️ 动画</button><button class="btn" onclick="resetCam()">📷 重置</button></div>

<script type="text/javascript">
let progress = 0;
function setProgress(p, status) {
    progress = p;
    document.getElementById('bar').style.width = p + '%';
    if (status) document.getElementById('status').textContent = status;
    if (p >= 100) setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
}

// 加载 Phoenix Engine WASM 模块
var Module = {
    onRuntimeInitialized: function() {
        console.log('✅ Phoenix Engine WASM 已初始化');
        setProgress(100, '引擎就绪！');
        
        // 调用 WASM 导出函数
        if (typeof Module._init_demo === 'function') {
            Module._init_demo();
        }
        
        // 启动渲染循环
        function render() {
            if (typeof Module._render_frame === 'function') {
                Module._render_frame();
            }
            requestAnimationFrame(render);
        }
        render();
    },
    print: function(text) { console.log('WASM:', text); },
    printErr: function(text) { console.error('WASM Error:', text); }
};

setProgress(30, '加载 WASM 模块...');
</script>
<script type="text/javascript" src="phoenix-engine.js"></script>
<script>
// 回退方案：如果 WASM 加载失败，使用纯 WebGL
setProgress(50, '初始化 WebGL...');

const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

if (!gl) {
    document.getElementById('loading').innerHTML = '<h1 class="error">❌ WebGL 不支持</h1><p>请使用 Chrome/Firefox/Edge/Safari</p>';
} else {
    // 简单的 WebGL 演示作为后备
    const vs = 'attribute vec3 p;attribute vec3 c;varying vec3 v;uniform mat4 m;uniform float t;void main(){v=c;vec3 x=p;if(sin(t)*0.3>0.){float a=sin(t)*0.3;float co=cos(a),si=sin(a);x.xz=mat2(co,-si,si,co)*x.z;}gl_Position=m*vec4(x,1.);}';
    const fs = 'precision mediump float;varying vec3 v;void main(){gl_FragColor=vec4(v,1.);}';
    
    function compile(s, t) { const x = gl.createShader(t); gl.shaderSource(x, s); gl.compileShader(x); return x; }
    const p = gl.createProgram(); gl.attachShader(p, compile(vs, gl.VERTEX_SHADER)); gl.attachShader(p, compile(fs, gl.FRAGMENT_SHADER)); gl.linkProgram(p); gl.useProgram(p);
    
    const verts = new Float32Array([-0.5,-0.5,0.5,1,0,0,0.5,-0.5,0.5,1,0,0,0.5,0.5,0.5,1,0,0,-0.5,0.5,0.5,1,0,0,-0.5,-0.5,-0.5,0,1,0,0.5,-0.5,-0.5,0,1,0,0.5,0.5,-0.5,0,1,0,-0.5,0.5,-0.5,0,1,0]);
    const idx = new Uint16Array([0,1,2,0,2,3,4,6,5,4,7,6]);
    
    const vao = gl.createVertexArray(); gl.bindVertexArray(vao);
    const vbo = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vbo); gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
    const ibo = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo); gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, idx, gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 24, 0);
    gl.enableVertexAttribArray(1); gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 24, 12);
    
    gl.enable(gl.DEPTH_TEST); gl.enable(gl.CULL_FACE);
    
    function perspective(f, a, n, f2) { const t = 1/Math.tan(f/2), nf = 1/(n-f2); return new Float32Array([t/a,0,0,0,0,t,0,0,0,0,(f2+n)*nf,-1,0,0,2*f2*n*nf,0]); }
    function lookAt(ex,ey,ez,cx,cy,cz,ux,uy,uz) { const z0=ex-cx,z1=ey-cy,z2=ez-cz,l=1/Math.sqrt(z0*z0+z1*z1+z2*z2),rz0=z0*l,rz1=z1*l,rz2=z2*l; const x0=uy*rz2-uz*rz1,x1=uz*rz0-ux*rz2,x2=ux*rz1-uy*rz0,xl=Math.sqrt(x0*x0+x1*x1+x2*x2),sx0=x0/xl,sx1=x1/xl,sx2=x2/xl; const y0=rz1*sx2-rz2*sx1,y1=rz2*sx0-rz0*sx2,y2=rz0*sx1-rz1*sx0; return new Float32Array([sx0,y0,-rz0,0,sx1,y1,-rz1,0,sx2,y2,-rz2,0,-(sx0*ex+sx1*ey+sx2*ez),-(y0*ex+y1*ey+y2*ey)+(rz0*ex+rz1*ey+rz2*ez),1]); }
    function rotateY(a) { const c=Math.cos(a),s=Math.sin(a); return new Float32Array([c,0,-s,0,0,1,0,0,s,0,c,0,0,0,0,1]); }
    function multiply(a,b) { return new Float32Array([a[0]*b[0]+a[4]*b[1]+a[8]*b[2]+a[12]*b[3],a[1]*b[0]+a[5]*b[1]+a[9]*b[2]+a[13]*b[3],a[2]*b[0]+a[6]*b[1]+a[10]*b[2]+a[14]*b[3],a[3]*b[0]+a[7]*b[1]+a[11]*b[2]+a[15]*b[3],a[0]*b[4]+a[4]*b[5]+a[8]*b[6]+a[12]*b[7],a[1]*b[4]+a[5]*b[5]+a[9]*b[6]+a[13]*b[7],a[2]*b[4]+a[6]*b[5]+a[10]*b[6]+a[14]*b[7],a[3]*b[4]+a[7]*b[5]+a[11]*b[6]+a[15]*b[7],a[0]*b[8]+a[4]*b[9]+a[8]*b[10]+a[12]*b[11],a[1]*b[8]+a[5]*b[9]+a[9]*b[10]+a[13]*b[11],a[2]*b[8]+a[6]*b[9]+a[10]*b[10]+a[14]*b[11],a[3]*b[8]+a[7]*b[9]+a[11]*b[10]+a[15]*b[11],a[0]*b[12]+a[4]*b[13]+a[8]*b[14]+a[12]*b[15],a[1]*b[12]+a[5]*b[13]+a[9]*b[14]+a[13]*b[15],a[2]*b[12]+a[6]*b[13]+a[10]*b[14]+a[14]*b[15],a[3]*b[12]+a[7]*b[13]+a[11]*b[14]+a[15]*b[15]]); }
    
    let rot = 0, camAng = 0.3, camDist = 4, camH = 2;
    let lastT = performance.now(), fps = 0, fc = 0;
    
    function resize() { const dpr = devicePixelRatio || 1; canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr; canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px'; gl.viewport(0, 0, canvas.width, canvas.height); }
    resize(); addEventListener('resize', resize);
    
    let dragging = false, lastX = 0, lastY = 0;
    canvas.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mousemove', e => { if (!dragging) return; camAng += (e.clientX - lastX) * 0.01; camH += (e.clientY - lastY) * 0.01; camH = Math.max(0.5, Math.min(5, camH)); lastX = e.clientX; lastY = e.clientY; });
    canvas.addEventListener('wheel', e => { e.preventDefault(); camDist += e.deltaY * 0.005; camDist = Math.max(2, Math.min(10, camDist)); }, { passive: false });
    
    window.changeMat = () => {};
    window.toggleAnim = () => {};
    window.resetCam = () => { camAng = 0.3; camDist = 4; camH = 2; };
    
    function render(t) {
        const dt = (t - lastT) / 1000; lastT = t;
        fc++; if (t - lastT >= 1000) { fps = Math.round(fc * 1000 / (t - lastT)); fc = 0; document.getElementById('fps').textContent = fps; document.getElementById('frameTime').textContent = (1000/fps).toFixed(1) + ' ms'; }
        rot += dt * 0.5;
        gl.clearColor(0.05, 0.05, 0.1, 1); gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
        const proj = perspective(Math.PI/4, canvas.width/canvas.height, 0.1, 100);
        const ex = Math.sin(camAng)*camDist, ey = camH, ez = Math.cos(camAng)*camDist;
        const view = lookAt(ex, ey, ez, 0, 0, 0, 0, 1, 0);
        const model = rotateY(rot);
        const mvp = multiply(proj, multiply(view, model));
        gl.uniformMatrix4fv(gl.getUniformLocation(p, 'm'), false, mvp);
        gl.uniform1f(gl.getUniformLocation(p, 't'), t/1000);
        gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);
        document.getElementById('tris').textContent = '36';
        document.getElementById('draws').textContent = '1';
        requestAnimationFrame(render);
    }
    setProgress(80, '启动渲染...');
    requestAnimationFrame(render);
}
</script>
</body>
</html>
