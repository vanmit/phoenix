<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Engine - WASM Demo (简化版)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0d1117;color:#e6edf3;overflow:hidden}
#canvas{width:100vw;height:100vh;display:block}
#ui{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);padding:15px;border-radius:10px;border:1px solid #30363d}
#ui h3{color:#58a6ff;margin-bottom:10px;font-size:14px}
#ui p{font-size:12px;color:#8b949e;margin:5px 0}
.stat{display:flex;justify-content:space-between;gap:20px;margin:5px 0}
.stat-label{color:#8b949e}
.stat-value{color:#3fb950;font-weight:700}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
#loading h2{color:#58a6ff;margin-bottom:10px}
#loading p{color:#8b949e}
.error{color:#f85149!important}
.controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;background:rgba(0,0,0,0.7);padding:15px;border-radius:10px;border:1px solid #30363d}
.btn{background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;transition:.3s}
.btn:hover{background:#2ea043}
.btn:active{transform:scale(0.98)}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="loading">
<h2>🦄 Phoenix Engine Demo</h2>
<p>正在初始化 WebGL...</p>
</div>

<div id="ui" style="display:none">
<h3>📊 性能监控</h3>
<div class="stat"><span class="stat-label">FPS</span><span class="stat-value" id="fps">0</span></div>
<div class="stat"><span class="stat-label">三角形</span><span class="stat-value" id="triangles">0</span></div>
<div class="stat"><span class="stat-label">Draw Calls</span><span class="stat-value" id="drawcalls">1</span></div>
<div class="stat"><span class="stat-label">分辨率</span><span class="stat-value" id="resolution">0x0</span></div>
</div>

<div class="controls" id="controls" style="display:none">
<button class="btn" onclick="changeColor()">🎨 更换颜色</button>
<button class="btn" onclick="toggleRotation()">⏯️ 暂停旋转</button>
<button class="btn" onclick="resetCamera()">📷 重置视角</button>
</div>

<script>
// Phoenix Engine - 简化版 WebGL Demo
// 不依赖 WASM，纯 JavaScript 实现

const canvas = document.getElementById('canvas');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

if (!gl) {
    document.getElementById('loading').innerHTML = `
        <h2 class="error">❌ WebGL 不支持</h2>
        <p>您的浏览器不支持 WebGL，请使用 Chrome/Firefox/Edge/Safari 最新版本</p>
    `;
    throw new Error('WebGL not supported');
}

// 调整 canvas 尺寸
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    document.getElementById('resolution').textContent = `${canvas.width}x${canvas.height}`;
}
resize();
window.addEventListener('resize', resize);

// 顶点着色器
const vsSource = `
    attribute vec4 aPosition;
    attribute vec3 aColor;
    varying vec3 vColor;
    uniform mat4 uModel;
    uniform mat4 uView;
    uniform mat4 uProjection;
    void main() {
        vColor = aColor;
        gl_Position = uProjection * uView * uModel * aPosition;
    }
`;

// 片段着色器
const fsSource = `
    precision mediump float;
    varying vec3 vColor;
    void main() {
        gl_FragColor = vec4(vColor, 1.0);
    }
`;

// 编译着色器
function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error('Shader compile error:', gl.getShaderInfoLog(shader));
        gl.deleteShader(shader);
        return null;
    }
    return shader;
}

// 创建程序
const vertexShader = createShader(gl, gl.VERTEX_SHADER, vsSource);
const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fsSource);
const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

// 创建立方体顶点
const vertices = new Float32Array([
    // 前面
    -0.5, -0.5,  0.5,  1, 0, 0,
     0.5, -0.5,  0.5,  1, 0, 0,
     0.5,  0.5,  0.5,  1, 0, 0,
    -0.5,  0.5,  0.5,  1, 0, 0,
    // 后面
    -0.5, -0.5, -0.5,  0, 1, 0,
     0.5, -0.5, -0.5,  0, 1, 0,
     0.5,  0.5, -0.5,  0, 1, 0,
    -0.5,  0.5, -0.5,  0, 1, 0,
    // 上面
    -0.5,  0.5, -0.5,  0, 0, 1,
     0.5,  0.5, -0.5,  0, 0, 1,
     0.5,  0.5,  0.5,  0, 0, 1,
    -0.5,  0.5,  0.5,  0, 0, 1,
    // 下面
    -0.5, -0.5, -0.5,  1, 1, 0,
     0.5, -0.5, -0.5,  1, 1, 0,
     0.5, -0.5,  0.5,  1, 1, 0,
    -0.5, -0.5,  0.5,  1, 1, 0,
    // 右面
     0.5, -0.5, -0.5,  1, 0, 1,
     0.5,  0.5, -0.5,  1, 0, 1,
     0.5,  0.5,  0.5,  1, 0, 1,
     0.5, -0.5,  0.5,  1, 0, 1,
    // 左面
    -0.5, -0.5, -0.5,  0, 1, 1,
    -0.5,  0.5, -0.5,  0, 1, 1,
    -0.5,  0.5,  0.5,  0, 1, 1,
    -0.5, -0.5,  0.5,  0, 1, 1,
]);

const indices = new Uint16Array([
    0, 1, 2, 0, 2, 3,    // 前面
    4, 6, 5, 4, 7, 6,    // 后面
    8, 9, 10, 8, 10, 11,  // 上面
    12, 14, 13, 12, 15, 14, // 下面
    16, 17, 18, 16, 18, 19, // 右面
    20, 22, 21, 20, 23, 22  // 左面
]);

// 创建缓冲
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

const ibo = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.STATIC_DRAW);

// 获取属性位置
const aPosition = gl.getAttribLocation(program, 'aPosition');
const aColor = gl.getAttribLocation(program, 'aColor');
gl.enableVertexAttribArray(aPosition);
gl.enableVertexAttribArray(aColor);
gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 24, 0);
gl.vertexAttribPointer(aColor, 3, gl.FLOAT, false, 24, 12);

// 获取 uniform 位置
const uModel = gl.getUniformLocation(program, 'uModel');
const uView = gl.getUniformLocation(program, 'uView');
const uProjection = gl.getUniformLocation(program, 'uProjection');

// 矩阵工具函数
function createPerspective(fov, aspect, near, far) {
    const f = 1.0 / Math.tan(fov / 2);
    const nf = 1 / (near - far);
    return new Float32Array([
        f / aspect, 0, 0, 0,
        0, f, 0, 0,
        0, 0, (far + near) * nf, -1,
        0, 0, (2 * far * near) * nf, 0
    ]);
}

function createLookAt(eye, center, up) {
    const z = normalize(subtract(eye, center));
    const x = normalize(cross(up, z));
    const y = cross(z, x);
    return new Float32Array([
        x[0], y[0], z[0], 0,
        x[1], y[1], z[1], 0,
        x[2], y[2], z[2], 0,
        -dot(x, eye), -dot(y, eye), -dot(z, eye), 1
    ]);
}

function createRotationY(angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return new Float32Array([
        c, 0, -s, 0,
        0, 1, 0, 0,
        s, 0, c, 0,
        0, 0, 0, 1
    ]);
}

function subtract(a, b) { return [a[0]-b[0], a[1]-b[1], a[2]-b[2]]; }
function cross(a, b) { return [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]]; }
function normalize(v) { const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]); return v.map(x=>x/l); }
function dot(a, b) { return a[0]*b[0]+a[1]*b[1]+a[2]*b[2]; }

// 渲染状态
let rotation = 0;
let isRotating = true;
let cubeColor = [1, 0, 0];
let lastTime = 0;
let frameCount = 0;
let fps = 0;

// 交互控制
let cameraAngle = 0;
let cameraDistance = 3;

canvas.addEventListener('click', () => {
    cubeColor = [Math.random(), Math.random(), Math.random()];
});

canvas.addEventListener('mousemove', (e) => {
    if (e.buttons === 1) {
        cameraAngle += e.movementX * 0.01;
    }
});

canvas.addEventListener('wheel', (e) => {
    cameraDistance += e.deltaY * 0.01;
    cameraDistance = Math.max(1, Math.min(10, cameraDistance));
});

// 渲染循环
function render(time) {
    time *= 0.001;
    const dt = time - lastTime;
    lastTime = time;
    
    // FPS 计算
    frameCount++;
    if (time - lastFpsTime >= 1) {
        fps = frameCount;
        frameCount = 0;
        lastFpsTime = time;
        document.getElementById('fps').textContent = fps;
    }
    
    if (isRotating) rotation += dt * 0.5;
    cameraAngle += dt * 0.2;
    
    // 清除
    gl.clearColor(0.05, 0.05, 0.1, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.DEPTH_TEST);
    
    // 设置矩阵
    const projection = createPerspective(Math.PI / 4, canvas.width / canvas.height, 0.1, 100);
    const view = createLookAt(
        [Math.sin(cameraAngle) * cameraDistance, 1, Math.cos(cameraAngle) * cameraDistance],
        [0, 0, 0],
        [0, 1, 0]
    );
    const model = createRotationY(rotation);
    
    gl.uniformMatrix4fv(uProjection, false, projection);
    gl.uniformMatrix4fv(uView, false, view);
    gl.uniformMatrix4fv(uModel, false, model);
    
    // 绘制
    gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);
    
    document.getElementById('triangles').textContent = '12';
    document.getElementById('drawcalls').textContent = '1';
    
    requestAnimationFrame(render);
}

let lastFpsTime = 0;

// 启动
setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    document.getElementById('controls').style.display = 'flex';
    requestAnimationFrame(render);
}, 500);

// 控制函数
function changeColor() {
    cubeColor = [Math.random(), Math.random(), Math.random()];
}

function toggleRotation() {
    isRotating = !isRotating;
}

function resetCamera() {
    cameraAngle = 0;
    cameraDistance = 3;
    rotation = 0;
}

console.log('Phoenix Engine Demo initialized successfully!');
</script>
</body>
</html>
