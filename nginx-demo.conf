# Phoenix Engine Demo - Nginx Configuration
# Place in: /etc/nginx/sites-available/phoenix-demo

server {
    listen 3000;
    server_name _;
    
    root /var/www/html;
    index index.html;
    
    # Demo directory
    location /demo/ {
        alias /var/www/html/demo/;
        index index.html;
        
        # Enable Brotli compression if available
        brotli on;
        brotli_comp_level 6;
        brotli_types application/wasm text/css application/javascript image/svg+xml;
        
        # Fallback to gzip
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types application/wasm text/css application/javascript image/svg+xml;
        
        # WASM MIME type
        location ~* \.wasm$ {
            default_type application/wasm;
            add_header Content-Type application/wasm;
            
            # Cache WASM files aggressively
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        
        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|glb|gltf)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # CORS for WASM loading
        location ~* \.(wasm|data)$ {
            add_header Access-Control-Allow-Origin "*";
        }
    }
    
    # Demo center
    location = /demo-center.html {
        root /var/www/html;
        gzip on;
        gzip_types text/html;
    }
    
    # Service Worker
    location = /demo/sw.js {
        alias /var/www/html/demo/sw.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/demo/";
    }
    
    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # Logging
    access_log /var/log/nginx/phoenix-demo-access.log;
    error_log /var/log/nginx/phoenix-demo-error.log;
}
